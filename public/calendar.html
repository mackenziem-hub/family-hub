<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Calendar - Family Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
  <script src="/assets/auth-guard.js"></script>
  <style>
    .tag { display:inline-block; font-size:10px; padding:1px 7px; border-radius:999px; background:var(--bg-2); color:var(--text-dim); margin:2px 4px 0 0; }
    .tag.ok { color:var(--accent); border:1px solid var(--border); }
  </style>
</head>
<body>
  <div class="app">
    <div class="app-header"><div><h1>📅 Calendar</h1><div class="sub">Next 7 days</div></div></div>

    <div id="connectZone"></div>
    <div id="content"><div class="card"><div class="empty"><span class="spin"></span> Loading...</div></div></div>

    <div class="card" id="placesCard" hidden>
      <h2>Things to do in NB</h2>
      <div style="margin-bottom:10px;">
        <label style="font-size:13px;color:var(--text-dim);"><input type="checkbox" id="sensoryOnly"> Sensory-friendly only</label>
      </div>
      <ul class="list" id="places"></ul>
    </div>
    <p class="toast" id="error"></p>
  </div>

  <script src="/assets/api.js"></script>
  <script src="/assets/tabbar.js"></script>
  <script>
    (function () {
      const content = document.getElementById('content');
      const connectZone = document.getElementById('connectZone');
      const errorEl = document.getElementById('error');
      let googleConnected = false;

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }
      function dayKey(d) { return d.toLocaleDateString('en-CA'); }
      function groupLabel(d) {
        const t = new Date(); const tm = new Date(); tm.setDate(t.getDate() + 1);
        if (dayKey(d) === dayKey(t)) return 'Today';
        if (dayKey(d) === dayKey(tm)) return 'Tomorrow';
        return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
      }
      function timeLabel(e) {
        if (e.allDay) return 'All day';
        return new Date(e.startTime).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      }

      function renderConnect(status) {
        if (status.connected) {
          googleConnected = true;
          connectZone.innerHTML = `<div class="card">
            <form id="addForm">
              <div class="row" style="align-items:flex-end;">
                <div class="field" style="flex:2;margin:0;"><label>New event</label><input class="input" id="evSummary" placeholder="Title" autocomplete="off"></div>
                <div class="field" style="flex:1;margin:0;"><label>When</label><input class="input" id="evWhen" type="datetime-local"></div>
              </div>
              <button class="btn block" type="submit" style="margin-top:10px;">Add to calendar</button>
            </form>
          </div>`;
          document.getElementById('addForm').addEventListener('submit', addEvent);
        } else if (status.configured) {
          connectZone.innerHTML = `<div class="card glow"><h2>Connect Google Calendar</h2>
            <p class="muted">Connect your Google account to add and remove events from here. Until then, your week is shown read-only.</p>
            <button class="btn block" id="connectBtn">Connect Google Calendar</button></div>`;
          document.getElementById('connectBtn').addEventListener('click', connectGoogle);
        }
      }

      async function connectGoogle() {
        try { const { url } = await api.get('/api/google-oauth?action=start'); window.location.href = url; }
        catch (e) { errorEl.textContent = e.message; }
      }

      async function addEvent(ev) {
        ev.preventDefault();
        const summary = document.getElementById('evSummary').value.trim();
        const when = document.getElementById('evWhen').value; // e.g. 2026-06-01T14:00
        if (!summary || !when) return;
        const start = when.length === 16 ? when + ':00' : when;
        // 1 hour after start, formatted as a NAIVE local string (no Z) to match `start`.
        // The server attaches the family timezone, so both must be local wall-clock.
        const e = new Date(new Date(start).getTime() + 3600000);
        const pad = (n) => String(n).padStart(2, '0');
        const endStr = `${e.getFullYear()}-${pad(e.getMonth() + 1)}-${pad(e.getDate())}T${pad(e.getHours())}:${pad(e.getMinutes())}:${pad(e.getSeconds())}`;
        try {
          await api.post('/api/calendar', { summary, start, end: endStr });
          document.getElementById('evSummary').value = ''; document.getElementById('evWhen').value = '';
          loadEvents();
        } catch (e) { errorEl.textContent = e.message; }
      }

      function renderEvents(data) {
        const events = data.events || [];
        if (!data.configured) {
          content.innerHTML = `<div class="card"><div class="empty">Calendar not connected. Add your Google iCal URL or connect above.</div></div>`;
          return;
        }
        if (!events.length) {
          content.innerHTML = `<div class="card"><div class="empty">Nothing scheduled in the next 7 days.</div></div>`;
          return;
        }
        const canDelete = data.source === 'google';
        const groups = new Map();
        for (const e of events) {
          const d = new Date(e.startTime); const k = dayKey(d);
          if (!groups.has(k)) groups.set(k, { label: groupLabel(d), items: [] });
          groups.get(k).items.push(e);
        }
        let html = '';
        for (const { label, items } of groups.values()) {
          html += `<div class="card"><h2>${esc(label)}</h2><ul class="list">`;
          html += items.map((e) => `<li class="list-item" data-id="${esc(e.uid || '')}">
            <div class="body"><div class="name">${esc(e.summary)}</div>
              <div class="meta">${esc(timeLabel(e))}${e.location ? ' · ' + esc(e.location) : ''}</div></div>
            ${canDelete && e.uid ? '<div class="x" data-act="del" title="Remove">✕</div>' : ''}
          </li>`).join('');
          html += `</ul></div>`;
        }
        content.innerHTML = html;
        if (canDelete) {
          content.querySelectorAll('[data-act="del"]').forEach((x) => x.addEventListener('click', async () => {
            const id = x.closest('.list-item').dataset.id;
            if (!id || !confirm('Remove this event?')) return;
            try { await api.del('/api/calendar?id=' + encodeURIComponent(id)); loadEvents(); }
            catch (e) { errorEl.textContent = e.message; }
          }));
        }
      }

      async function loadEvents() {
        try { renderEvents(await api.get('/api/calendar?days=7')); }
        catch (e) { if (e.message !== 'unauthorized') content.innerHTML = `<div class="card"><div class="empty">Could not load (${esc(e.message)}).</div></div>`; }
      }

      // Things to do (Phase 6 seed places). Card stays hidden if the API/table is absent.
      async function loadPlaces() {
        try {
          const sensory = document.getElementById('sensoryOnly').checked ? '&sensory=1' : '';
          const places = await api.get('/api/places?venues=1' + sensory);
          const card = document.getElementById('placesCard');
          if (!Array.isArray(places) || !places.length) { card.hidden = true; return; }
          card.hidden = false;
          document.getElementById('places').innerHTML = places.map((p) => {
            const tags = [p.indoor_outdoor, p.crowd_level && (p.crowd_level + ' crowd'), p.easy_exit && 'easy exit', p.sensory_friendly && 'sensory-friendly']
              .filter(Boolean).map((t) => `<span class="tag${/sensory/.test(t) ? ' ok' : ''}">${esc(t)}</span>`).join('');
            return `<li class="list-item" style="cursor:default;"><div class="body">
              <div class="name">${esc(p.name)}${p.url ? ` <a href="${esc(p.url)}" target="_blank" rel="noopener" style="color:var(--accent);font-size:12px;">↗</a>` : ''}</div>
              <div class="meta">${esc((p.what_why || '').slice(0, 110))}</div><div>${tags}</div></div></li>`;
          }).join('');
        } catch { document.getElementById('placesCard').hidden = true; }
      }
      document.getElementById('sensoryOnly').addEventListener('change', loadPlaces);

      // Status toast from OAuth redirect.
      const g = new URLSearchParams(location.search).get('google');
      if (g === 'connected') { errorEl.style.color = 'var(--success)'; errorEl.textContent = 'Google Calendar connected.'; window.history.replaceState(null, '', '/calendar.html'); }
      else if (g) { errorEl.textContent = 'Calendar connect did not finish. Try again.'; window.history.replaceState(null, '', '/calendar.html'); }

      api.get('/api/google-oauth?action=status').then(renderConnect).catch(() => {});
      loadEvents();
      loadPlaces();
    })();
  </script>
</body>
</html>
