<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Groceries - Family Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
  <script src="/assets/auth-guard.js"></script>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <div><h1>🛒 Groceries</h1><div class="sub" id="sub">Shared list</div></div>
    </div>

    <div class="card glow">
      <form id="addForm" class="row" style="align-items:flex-end;">
        <div class="field" style="flex:2;margin:0;">
          <label for="name">Add item</label>
          <input class="input" id="name" placeholder="e.g. Milk" autocomplete="off" required />
        </div>
        <div class="field" style="flex:1;margin:0;">
          <label for="qty">Qty</label>
          <input class="input" id="qty" placeholder="1" autocomplete="off" />
        </div>
        <button class="btn" id="addBtn" type="submit" style="flex:0 0 auto;">Add</button>
      </form>
      <p class="toast" id="error"></p>
    </div>

    <div class="card">
      <ul class="list" id="list"></ul>
      <div class="empty" id="empty" hidden>Nothing on the list. Add something above.</div>
    </div>

    <div class="row" style="margin-top:4px;">
      <button class="btn ghost" id="toggleChecked">Show checked</button>
      <button class="btn danger" id="clearChecked">Clear checked</button>
    </div>
  </div>

  <script src="/assets/api.js"></script>
  <script src="/assets/tabbar.js"></script>
  <script>
    (function () {
      const meId = (window.FamilyAuth.user && window.FamilyAuth.user.id) || null;
      const listEl = document.getElementById('list');
      const emptyEl = document.getElementById('empty');
      const errorEl = document.getElementById('error');
      let showChecked = false;
      let items = [];
      let pollTimer = null;

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }

      function render() {
        const visible = showChecked ? items : items.filter((i) => !i.checked);
        emptyEl.hidden = visible.length > 0;
        listEl.innerHTML = visible.map((i) => {
          const meta = [i.quantity, i.category, (i.added_by === meId ? 'you' : null)]
            .filter(Boolean).map(esc).join(' · ');
          return `<li class="list-item ${i.checked ? 'done' : ''}" data-id="${i.id}">
            <div class="check" data-act="toggle">${i.checked ? '✓' : ''}</div>
            <div class="body">
              <div class="name">${esc(i.name)}</div>
              ${meta ? `<div class="meta">${meta}</div>` : ''}
            </div>
            <div class="x" data-act="del" title="Remove">✕</div>
          </li>`;
        }).join('');
      }

      async function load() {
        try {
          items = await api.get('/api/groceries?include_checked=1');
          render();
        } catch (e) { if (e.message !== 'unauthorized') errorEl.textContent = e.message; }
      }

      // Optimistic toggle, then reconcile with the server.
      listEl.addEventListener('click', async (ev) => {
        const li = ev.target.closest('.list-item'); if (!li) return;
        const id = li.dataset.id;
        const act = ev.target.dataset.act;
        const idx = items.findIndex((i) => i.id === id); if (idx < 0) return;
        const item = items[idx];
        if (act === 'toggle') {
          const prev = item.checked;
          item.checked = !item.checked; render();
          try { await api.patch('/api/groceries', { id, checked: item.checked }); }
          catch (e) { item.checked = prev; render(); if (e.message !== 'unauthorized') errorEl.textContent = e.message; }
        } else if (act === 'del') {
          const removed = item;
          items.splice(idx, 1); render();
          try { await api.del('/api/groceries?id=' + encodeURIComponent(id)); }
          catch (e) { items.splice(idx, 0, removed); render(); if (e.message !== 'unauthorized') errorEl.textContent = e.message; }
        }
      });

      document.getElementById('addForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        errorEl.textContent = '';
        const nameEl = document.getElementById('name');
        const qtyEl = document.getElementById('qty');
        const name = nameEl.value.trim();
        if (!name) return;
        try {
          const created = await api.post('/api/groceries', { name, quantity: qtyEl.value.trim() || undefined });
          items.push(created); render();
          nameEl.value = ''; qtyEl.value = ''; nameEl.focus();
        } catch (e) { if (e.message !== 'unauthorized') errorEl.textContent = e.message; }
      });

      document.getElementById('toggleChecked').addEventListener('click', (ev) => {
        showChecked = !showChecked;
        ev.target.textContent = showChecked ? 'Hide checked' : 'Show checked';
        render();
      });

      document.getElementById('clearChecked').addEventListener('click', async () => {
        if (!confirm('Remove all checked items?')) return;
        try { await api.del('/api/groceries?clear_checked=1'); load(); }
        catch (e) { if (e.message !== 'unauthorized') errorEl.textContent = e.message; }
      });

      // Poll so the other person's edits show up (~20s, and on focus/visibility).
      function startPoll() { stopPoll(); pollTimer = setInterval(load, 20000); }
      function stopPoll() { if (pollTimer) clearInterval(pollTimer); pollTimer = null; }
      window.addEventListener('focus', load);
      document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });

      load(); startPoll();
    })();
  </script>
</body>
</html>
