<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Family Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
  <script src="/assets/skin.js"></script>
  <script src="/assets/auth-guard.js"></script>
</head>
<body>
  <div class="app has-composer">
    <div class="skin-hero home-hero"></div>
    <div class="app-header">
      <div>
        <h1>Family <span class="brand-dot">Hub</span></h1>
        <div class="sub" id="greeting">Welcome back</div>
      </div>
      <button class="btn ghost" id="signOut" style="padding:8px 14px;font-size:13px;">Sign out</button>
    </div>

    <div class="card glow" id="captureCard">
      <h2>✨ Capture anything</h2>
      <p class="muted" style="font-size:13px;margin:0 0 8px;">Paste a school email, invite, or list, or snap a photo. I'll sort the events, groceries, and to-dos.</p>
      <textarea class="input" id="capText" rows="2" placeholder="Paste here..." style="min-height:46px;"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn" id="capExtract">Sort it out</button>
        <button class="btn ghost" id="capPhotoBtn">📷 Photo</button>
        <input type="file" id="capFile" accept="image/*" capture="environment" hidden />
        <span class="muted" id="capStatus" style="font-size:12px;"></span>
      </div>
      <div id="capReview" hidden style="margin-top:10px;"></div>
    </div>

    <div class="strip">
      <a class="tile" href="/groceries.html" style="text-decoration:none;color:inherit;">
        <div class="k">Groceries to buy</div>
        <div class="v" id="groceryCount">--</div>
      </a>
      <a class="tile" href="/calendar.html" style="text-decoration:none;color:inherit;">
        <div class="k">Next up</div>
        <div class="v" id="nextEvent" style="font-size:14px;font-weight:700;line-height:1.3;">--</div>
      </a>
    </div>

    <div class="mode-bar" id="modeBar">
      <button class="mode-chip active" data-mode="general">General</button>
      <button class="mode-chip" data-mode="nutrition">Nutrition</button>
      <button class="mode-chip" data-mode="healthy">Healthy living</button>
      <button class="mode-chip" data-mode="coach">Coach</button>
      <button class="mode-chip ghost-chip" id="interviewBtn">Interview me</button>
    </div>

    <div class="chat-log" id="chatLog"></div>
  </div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Ask anything, or add to the list, check the week..." autocomplete="off"></textarea>
    <button class="btn send" id="sendBtn" title="Send">↑</button>
  </div>

  <script src="/assets/api.js"></script>
  <script src="/assets/tabbar.js"></script>
  <script>
    (function () {
      const log = document.getElementById('chatLog');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      let busy = false;
      let mode = 'general';

      const user = window.FamilyAuth && window.FamilyAuth.user;
      if (user && user.name) document.getElementById('greeting').textContent = `Hi ${user.name}`;

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      }
      function scrollDown() { window.scrollTo(0, document.body.scrollHeight); }

      // Tiny safe markdown: escape first, then a handful of inline + block rules.
      function md(src) {
        let s = esc(src);
        s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
        s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        const lines = s.split('\n'); let out = '', ul = false, ol = false;
        const close = () => { if (ul) { out += '</ul>'; ul = false; } if (ol) { out += '</ol>'; ol = false; } };
        for (const line of lines) {
          const mu = line.match(/^\s*[-*]\s+(.*)$/), mo = line.match(/^\s*\d+\.\s+(.*)$/);
          if (mu) { if (!ul) { close(); out += '<ul>'; ul = true; } out += '<li>' + mu[1] + '</li>'; }
          else if (mo) { if (!ol) { close(); out += '<ol>'; ol = true; } out += '<li>' + mo[1] + '</li>'; }
          else if (!line.trim()) { close(); }
          else { close(); out += '<p>' + line + '</p>'; }
        }
        close(); return out;
      }
      function addBubble(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        if (role === 'assistant') div.innerHTML = md(text); else div.textContent = text || '';
        log.appendChild(div); scrollDown(); return div;
      }
      function addTyping() {
        const div = document.createElement('div');
        div.className = 'msg assistant typing-bubble';
        div.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
        log.appendChild(div); scrollDown(); return div;
      }
      const TOOL_LABELS = {
        add_grocery_item: 'Added to groceries', check_off_grocery: 'Checked off',
        list_groceries: 'Read the list', get_calendar: 'Checked the calendar',
        add_calendar_event: 'Added to calendar', log_meal: 'Logged a meal',
        get_nutrition_today: 'Checked nutrition', set_nutrition_target: 'Set a target',
        get_fitness_today: 'Checked activity', log_fitness: 'Logged activity',
        find_local_events: 'Found things to do', save_kid_item: 'Saved an idea',
        list_saved_items: 'Read saved ideas', log_play_moment: 'Logged a moment',
      };
      function addTool(name, ok) {
        const div = document.createElement('div'); div.className = 'msg tool';
        div.textContent = (ok === false ? '⚠ ' : '') + (TOOL_LABELS[name] || name);
        log.appendChild(div); scrollDown();
      }
      const num = (v) => (v != null ? Number(v).toLocaleString() : '--');
      function addCard(d) {
        const div = document.createElement('div'); div.className = 'chat-card';
        let html = '';
        if (d.kind === 'meal') {
          html = '<div class="cc-h"><span class="cc-ico">🍽️</span> Meal logged</div>' +
            '<div class="cc-big">' + num(d.calories) + ' <span>kcal</span></div>' +
            '<div class="cc-row"><span>P ' + num(d.protein_g) + 'g</span><span>C ' + num(d.carbs_g) + 'g</span><span>F ' + num(d.fat_g) + 'g</span></div>';
        } else if (d.kind === 'fitness') {
          const bits = [];
          if (d.steps != null) bits.push('<span>' + num(d.steps) + ' steps</span>');
          if (d.active_minutes != null) bits.push('<span>' + d.active_minutes + ' active min</span>');
          if (d.sleep_minutes != null) bits.push('<span>' + (d.sleep_minutes / 60).toFixed(1) + 'h sleep</span>');
          html = '<div class="cc-h"><span class="cc-ico">👟</span> Activity logged</div><div class="cc-row">' + bits.join('') + '</div>';
        } else if (d.kind === 'grocery') {
          html = '<div class="cc-h"><span class="cc-ico">🛒</span> Added</div><div class="cc-line">' + esc(d.name) + (d.quantity ? ' · ' + esc(d.quantity) : '') + '</div>';
        } else if (d.kind === 'grocery_check') {
          html = '<div class="cc-h"><span class="cc-ico">✓</span> Checked off</div><div class="cc-line">' + esc(d.name) + '</div>';
        } else if (d.kind === 'event') {
          html = '<div class="cc-h"><span class="cc-ico">📅</span> Added to calendar</div><div class="cc-line">' + esc(d.summary || 'Event') + (d.start ? '<span class="cc-when"> · ' + esc(d.start) + '</span>' : '') + '</div>';
        } else if (d.kind === 'play') {
          html = '<div class="cc-h"><span class="cc-ico">🎉</span> Nice move together</div>';
        } else if (d.kind === 'profile') {
          html = '<div class="cc-h"><span class="cc-ico">📝</span> Profile updated</div><div class="cc-line">' + esc((d.updated || []).join(', ')) + '</div>';
        } else if (d.kind === 'memory') {
          html = '<div class="cc-h"><span class="cc-ico">🧠</span> ' + (d.status === 'already known' ? 'Already knew that' : 'Remembered') + '</div><div class="cc-line">' + esc(d.content || '') + '</div>';
        } else if (d.kind === 'freebusy') {
          const fmt = (iso) => new Date(iso).toLocaleString('en-CA', { weekday: 'short', hour: 'numeric', minute: '2-digit' });
          const slots = (d.slots || []).map((s) => '<div>' + fmt(s.start) + ' to ' + new Date(s.end).toLocaleString('en-CA', { hour: 'numeric', minute: '2-digit' }) + '</div>').join('');
          const nc = (d.not_connected && d.not_connected.length) ? '<div class="cc-when">Note: ' + esc(d.not_connected.join(', ')) + ' not connected</div>' : '';
          html = '<div class="cc-h"><span class="cc-ico">🗓️</span> Everyone free (' + d.connected + ' connected)</div>' + slots + nc;
        } else { return; }
        div.innerHTML = html; log.appendChild(div); scrollDown();
      }

      // Auto-grow textarea.
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      });
      sendBtn.addEventListener('click', send);

      document.querySelectorAll('.mode-chip[data-mode]').forEach((c) => c.addEventListener('click', () => {
        mode = c.dataset.mode;
        document.querySelectorAll('.mode-chip[data-mode]').forEach((x) => x.classList.toggle('active', x === c));
      }));
      document.getElementById('interviewBtn').addEventListener('click', () => {
        if (busy) return;
        input.value = 'Interview me to build out my profile. Ask me a couple of questions at a time and save what I tell you.';
        send();
      });

      async function send() {
        const text = input.value.trim();
        if (!text || busy) return;
        busy = true; sendBtn.disabled = true;
        input.value = ''; input.style.height = 'auto';
        addBubble('user', text);
        const typing = addTyping();
        let assistant = null, raw = '', started = false, cardAdded = false;
        const ensure = () => { if (!assistant) { assistant = document.createElement('div'); assistant.className = 'msg assistant'; log.insertBefore(assistant, typing); } return assistant; };

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...window.FamilyAuth.headers() },
            body: JSON.stringify({ message: text, mode }),
          });
          if (res.status === 401) { window.FamilyAuth.clearAndRedirect(); return; }
          if (!res.ok || !res.body) {
            let msg = 'Something went wrong.';
            try { msg = (await res.json()).message || msg; } catch {}
            typing.remove(); const e = ensure(); e.className = 'msg err'; e.textContent = msg;
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const events = buf.split('\n\n');
            buf = events.pop() || '';
            for (const ev of events) {
              let dataLine = null;
              for (const l of ev.split('\n')) if (l.startsWith('data: ')) dataLine = l.slice(6);
              if (!dataLine) continue;
              let d; try { d = JSON.parse(dataLine); } catch { continue; }
              if (d.type === 'text') {
                started = true; typing.style.display = 'none';
                ensure(); raw += d.text; assistant.textContent = raw; scrollDown();
              } else if (d.type === 'tool_end') {
                if (d.data) { addCard(d.data); cardAdded = true; }
                else if (d.ok === false) addTool(d.name, false);
              } else if (d.type === 'error') {
                typing.remove(); const e = ensure(); e.className = 'msg err'; e.textContent = d.message || 'Assistant error.';
              } else if (d.type === 'done') {
                typing.remove();
                if (started && assistant) assistant.innerHTML = md(raw);
                else if (!started && !cardAdded) addBubble('assistant', 'Done.');
              }
            }
          }
          try { typing.remove(); } catch {}
          if (started && assistant) assistant.innerHTML = md(raw);
        } catch (err) {
          try { typing.remove(); } catch {}
          const e = addBubble('assistant', ''); e.className = 'msg err'; e.textContent = 'Network error. Try again.';
        } finally {
          busy = false; sendBtn.disabled = false; input.focus(); scrollDown();
        }
      }

      // ---- Magic capture: paste/photo -> extract -> review -> fan out ----
      const capText = document.getElementById('capText');
      const capStatus = document.getElementById('capStatus');
      const capReview = document.getElementById('capReview');
      let capItems = [];
      const CAP_ICON = { event: '📅', grocery: '🛒', todo: '✅', reminder: '📌' };
      function renderCap(items) {
        capItems = items || [];
        capReview.hidden = false;
        if (!capItems.length) { capReview.innerHTML = '<div class="muted" style="font-size:13px;">Nothing to add found.</div>'; return; }
        const rows = capItems.map((it, i) => {
          const when = it.type === 'grocery'
            ? (it.quantity ? esc(it.quantity) : '')
            : ((it.all_day || !it.time) ? esc(it.date || 'no date') : esc((it.date || '') + ' ' + it.time));
          return '<label style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border-soft);">'
            + '<input type="checkbox" data-i="' + i + '" checked style="margin-top:3px;">'
            + '<span><span style="font-weight:600;">' + (CAP_ICON[it.type] || '•') + ' ' + esc(it.title) + '</span>'
            + (when ? '<br><span class="muted" style="font-size:12px;">' + when + (it.who ? ' · ' + esc(it.who) : '') + '</span>' : '')
            + '</span></label>';
        }).join('');
        capReview.innerHTML = rows + '<button class="btn" id="capCommit" style="margin-top:10px;">Add ' + capItems.length + ' to the hub</button>';
        document.getElementById('capCommit').addEventListener('click', commitCap);
      }
      async function commitCap() {
        const checked = [].slice.call(capReview.querySelectorAll('input[type=checkbox]')).filter((c) => c.checked).map((c) => capItems[+c.dataset.i]);
        if (!checked.length) return;
        const btn = document.getElementById('capCommit'); btn.disabled = true; btn.textContent = 'Adding...';
        try {
          const { results } = await api.post('/api/capture', { action: 'commit', items: checked });
          const ok = (results || []).filter((r) => r.ok).length;
          const need = (results || []).filter((r) => r.reason === 'calendar_not_connected').length;
          capReview.hidden = true; capText.value = '';
          capStatus.textContent = 'Added ' + ok + (need ? ' · ' + need + ' need calendar connected' : '') + ' ✓';
          api.get('/api/groceries').then((items) => { document.getElementById('groceryCount').textContent = String((items || []).filter((i) => !i.checked).length); }).catch(() => {});
          setTimeout(() => { capStatus.textContent = ''; }, 5000);
        } catch (e) { btn.disabled = false; btn.textContent = 'Add to the hub'; if (e.message !== 'unauthorized') capStatus.textContent = e.message; }
      }
      async function extractCap(payload) {
        capStatus.textContent = 'Reading...';
        try { const { items } = await api.post('/api/capture', Object.assign({ action: 'extract' }, payload)); capStatus.textContent = ''; renderCap(items); }
        catch (e) { capStatus.textContent = (e.message === 'unauthorized') ? '' : e.message; }
      }
      document.getElementById('capExtract').addEventListener('click', () => { const t = capText.value.trim(); if (t) extractCap({ text: t }); });
      document.getElementById('capPhotoBtn').addEventListener('click', () => document.getElementById('capFile').click());
      document.getElementById('capFile').addEventListener('change', async () => {
        const f = document.getElementById('capFile').files[0]; if (!f) return; document.getElementById('capFile').value = '';
        capStatus.textContent = 'Reading photo...';
        try { const base64 = await capDownscale(f, 2000, 0.8); await extractCap({ image_base64: base64, media_type: 'image/jpeg' }); }
        catch (e) { capStatus.textContent = ''; }
      });
      function capDownscale(file, max, q) {
        return new Promise((resolve, reject) => {
          const img = new Image(); const url = URL.createObjectURL(file);
          img.onload = () => { URL.revokeObjectURL(url); let w = img.width, h = img.height; if (w > max || h > max) { const s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); } const c = document.createElement('canvas'); c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); resolve(c.toDataURL('image/jpeg', q).split(',')[1]); };
          img.onerror = reject; img.src = url;
        });
      }

      // Load history + dashboard.
      api.get('/api/chat').then((data) => {
        const msgs = (data && data.messages) || [];
        if (!msgs.length) {
          addBubble('assistant', `Hi${user && user.name ? ' ' + user.name : ''}. I can add to the grocery list, tell you what's on the calendar, log meals, and help with ideas for the kids. What do you need?`);
        } else {
          for (const m of msgs) addBubble(m.role === 'user' ? 'user' : 'assistant', m.content);
        }
        // Deep link from other pages: /home.html?ask=... prefills and sends.
        const ask = new URLSearchParams(location.search).get('ask');
        if (ask && !busy) { input.value = ask; window.history.replaceState(null, '', '/home.html'); send(); }
      }).catch(() => {});

      api.get('/api/groceries').then((items) => {
        document.getElementById('groceryCount').textContent = String((items || []).filter((i) => !i.checked).length);
      }).catch(() => {});

      api.get('/api/calendar?days=7').then((data) => {
        const el = document.getElementById('nextEvent');
        if (!data || !data.configured) { el.textContent = 'Connect calendar'; return; }
        const e = (data.events || [])[0];
        if (!e) { el.textContent = 'Clear week'; return; }
        const when = e.allDay
          ? new Date(e.startTime).toLocaleDateString(undefined, { weekday: 'short' })
          : new Date(e.startTime).toLocaleString(undefined, { weekday: 'short', hour: 'numeric', minute: '2-digit' });
        el.textContent = e.summary.slice(0, 28) + (e.summary.length > 28 ? '…' : '');
        el.title = e.summary + ' (' + when + ')';
      }).catch(() => {});

      document.getElementById('signOut').addEventListener('click', async () => {
        try { await api.post('/api/auth?action=logout'); } catch {}
        window.FamilyAuth.clearAndRedirect();
      });
    })();
  </script>
</body>
</html>
